name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: |
          for file in $(find extension scripts \( -name '*.js' -o -name '*.mjs' \) -type f); do
            node --check "$file"
          done

      - name: Build and test
        run: npm run check

      - name: Build release artifacts
        run: npm run package
