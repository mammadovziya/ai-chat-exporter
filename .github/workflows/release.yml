name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check tag version
        run: npm run version:check

      - name: Check JavaScript syntax
        run: |
          for file in $(find extension scripts \( -name '*.js' -o -name '*.mjs' \) -type f); do
            node --check "$file"
          done

      - name: Build and test
        run: npm run check

      - name: Install browser for UI tests
        run: npx playwright install --with-deps chromium

      - name: Browser UI tests
        run: npm run test:browser

      - name: Build release artifacts
        run: npm run package

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" web-ext-artifacts/* --title "$GITHUB_REF_NAME" --generate-notes
