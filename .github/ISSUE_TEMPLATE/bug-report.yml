name: Bug report
description: Report a general extension bug.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: "What happened?"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "Browser, OS, extension version, provider if relevant"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
  - type: textarea
    id: logs
    attributes:
      label: Console errors or popup diagnostics
      description: Do not paste private chat content.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I checked existing issues.
          required: true
        - label: I removed private conversation content, secrets, and personal data.
          required: true
