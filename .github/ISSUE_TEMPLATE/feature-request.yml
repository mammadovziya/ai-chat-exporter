name: Feature request
description: Suggest a new export format, provider, or workflow improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: "What user problem would this solve?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: "Describe the behavior you want."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Export format
        - Provider support
        - Selection UI
        - Privacy/security
        - Store/install
        - Other
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy expectation
      options:
        - label: This should keep conversation data local to the browser.
          required: true
