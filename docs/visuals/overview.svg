<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">AI Chat Exporter interface overview</title>
  <desc id="desc">A Claude-like chat screen with right-side selection boxes and a compact export panel.</desc>
  <defs>
    <linearGradient id="panel" x1="820" x2="1080" y1="74" y2="524" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#f0ebe1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17130d" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1120" height="620" rx="28" fill="#fbfaf6"/>
  <rect x="0" y="0" width="244" height="620" rx="28" fill="#201f1b"/>
  <text x="34" y="58" fill="#f6f1e8" font-family="Georgia, serif" font-size="30" font-weight="700">Claude</text>
  <g fill="#c9c1b4" font-family="Inter, Arial, sans-serif" font-size="18">
    <text x="54" y="116">New chat</text>
    <text x="54" y="166">Chats</text>
    <text x="54" y="216">Projects</text>
    <text x="54" y="266">Artifacts</text>
  </g>
  <rect x="268" y="0" width="852" height="620" fill="#fbfaf6"/>
  <text x="304" y="58" fill="#27231f" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Using nmap on domain in Windows terminal</text>
  <g font-family="Georgia, serif" font-size="21" fill="#2b2823">
    <text x="332" y="124">The more useful question is why you don't want to be flagged.</text>
    <text x="332" y="162">If you're learning and avoiding accidental trouble, use a lab.</text>
    <text x="332" y="224">What the VPN does and doesn't change</text>
    <text x="332" y="262">It changes the source IP the target sees, but it does not make</text>
    <text x="332" y="300">a scan undetectable. Permission matters more than attribution.</text>
  </g>
  <rect x="330" y="344" width="470" height="82" rx="10" fill="#efede7" stroke="#d8d0c2"/>
  <text x="356" y="376" fill="#60594f" font-family="Inter, Arial, sans-serif" font-size="14">powershell</text>
  <text x="356" y="408" fill="#24211d" font-family="Consolas, monospace" font-size="18">winget install Insecure.Nmap</text>
  <g fill="#12312d" stroke="#2d7468" stroke-width="2">
    <rect x="802" y="106" width="28" height="28" rx="14"/>
    <rect x="802" y="210" width="28" height="28" rx="14"/>
    <rect x="802" y="344" width="28" height="28" rx="14"/>
  </g>
  <g stroke="#f7f7f2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="m811 120 5 5 9-11"/>
    <path d="m811 224 5 5 9-11"/>
    <path d="m811 358 5 5 9-11"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="848" y="64" width="232" height="450" rx="14" fill="url(#panel)" stroke="#d8d0c2"/>
    <text x="872" y="102" fill="#29251f" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Export chat</text>
    <text x="872" y="128" fill="#6f685e" font-family="Inter, Arial, sans-serif" font-size="14">3 of 3 selected</text>
    <rect x="872" y="158" width="184" height="40" rx="8" fill="#ffffff" stroke="#d8d0c2"/>
    <text x="888" y="183" fill="#29251f" font-family="Inter, Arial, sans-serif" font-size="15">Markdown</text>
    <rect x="872" y="216" width="54" height="38" rx="8" fill="#ece6dc" stroke="#d8d0c2"/>
    <text x="887" y="240" fill="#29251f" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Mute</text>
    <rect x="934" y="216" width="70" height="38" rx="8" fill="#ece6dc" stroke="#d8d0c2"/>
    <text x="949" y="240" fill="#29251f" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Settings</text>
    <rect x="1012" y="216" width="44" height="38" rx="8" fill="#12312d"/>
    <path d="M1034 226v13m-6-5 6 6 6-6" stroke="#f7f7f2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="872" y="282" width="184" height="38" rx="8" fill="#f7f3eb" stroke="#d8d0c2"/>
    <text x="898" y="306" fill="#29251f" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">All</text>
    <text x="944" y="306" fill="#29251f" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Claude</text>
    <text x="1012" y="306" fill="#29251f" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">You</text>
    <rect x="872" y="452" width="184" height="42" rx="8" fill="#12312d"/>
    <text x="944" y="478" fill="#f7f7f2" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Export</text>
  </g>
  <text x="332" y="544" fill="#726a60" font-family="Inter, Arial, sans-serif" font-size="16">Right-side message selection. Local-only PDF, Markdown, Text, JSON, CSV, and PNG exports.</text>
</svg>
