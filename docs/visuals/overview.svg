<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI Chat Exporter overview</title>
  <desc id="desc">A browser extension exporting selected AI chat messages with local privacy-first controls.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1200" y1="0" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="panel" x1="890" x2="1135" y1="88" y2="388" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2f6f5"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="32" fill="url(#page)"/>
  <rect x="34" y="34" width="1132" height="607" rx="22" fill="#ffffff" stroke="#d8dee7"/>
  <rect x="34" y="34" width="242" height="607" rx="22" fill="#111827"/>
  <rect x="34" y="34" width="242" height="607" rx="22" fill="#111827"/>
  <text x="66" y="86" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">AI Chat</text>
  <g fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650">
    <text x="72" y="142">New chat</text>
    <text x="72" y="190">Chats</text>
    <text x="72" y="238">Library</text>
    <text x="72" y="286">Settings</text>
  </g>
  <rect x="58" y="548" width="194" height="54" rx="14" fill="#1f2937"/>
  <circle cx="85" cy="575" r="15" fill="#10b981"/>
  <text x="111" y="581" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Local-first</text>
  <rect x="276" y="34" width="890" height="607" rx="22" fill="#fbfcfe"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="324" y="83" fill="#111827" font-size="20" font-weight="800">Research notes from AI chat</text>
    <rect x="1012" y="54" width="94" height="38" rx="19" fill="#111827"/>
    <path d="M1040 64v13m-6-5 6 6 6-6" stroke="#f8fafc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1054" y="78" fill="#f8fafc" font-size="14" font-weight="800">Export</text>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="316" y="132" width="512" height="86" rx="18" fill="#f2f7ff" stroke="#bfdbfe"/>
    <text x="344" y="168" fill="#1f2937" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">You</text>
    <text x="344" y="195" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">Export only the useful answers.</text>
    <rect x="794" y="154" width="30" height="30" rx="10" fill="#0f766e"/>
    <path d="m803 169 6 6 11-14" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="316" y="254" width="512" height="194" rx="18" fill="#ffffff" stroke="#d8dee7"/>
    <text x="344" y="290" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Assistant</text>
    <text x="344" y="321" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">Preserve Markdown, tables, math, and code.</text>
    <rect x="344" y="348" width="420" height="70" rx="12" fill="#111827"/>
    <text x="364" y="377" fill="#94a3b8" font-family="Consolas, monospace" font-size="14">python</text>
    <text x="364" y="402" fill="#f8fafc" font-family="Consolas, monospace" font-size="15">print("local export")</text>
    <rect x="794" y="276" width="30" height="30" rx="10" fill="#0f766e"/>
    <path d="m803 291 6 6 11-14" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="316" y="484" width="512" height="86" rx="18" fill="#f7f2ff" stroke="#ddd6fe"/>
    <text x="344" y="520" fill="#1f2937" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">You</text>
    <text x="344" y="547" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">Save it as PDF and Markdown.</text>
    <rect x="794" y="506" width="30" height="30" rx="10" fill="#0f766e"/>
    <path d="m803 521 6 6 11-14" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="890" y="108" width="246" height="284" rx="18" fill="url(#panel)" stroke="#cbd5e1"/>
    <text x="912" y="145" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Export chat</text>
    <text x="912" y="168" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="13">3 of 3 selected</text>
    <rect x="912" y="190" width="96" height="36" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="928" y="213" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Markdown</text>
    <rect x="1016" y="190" width="98" height="36" rx="9" fill="#0f766e"/>
    <path d="M1042 199v12m-5-5 5 5 5-5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1054" y="213" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Export</text>
    <rect x="912" y="236" width="96" height="34" rx="9" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="944" y="258" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Mute</text>
    <rect x="1016" y="236" width="98" height="34" rx="9" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1065" y="258" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Settings</text>
    <g fill="#ffffff" stroke="#cbd5e1">
      <rect x="912" y="288" width="96" height="34" rx="9"/>
      <rect x="1016" y="288" width="98" height="34" rx="9"/>
      <rect x="912" y="330" width="96" height="34" rx="9"/>
      <rect x="1016" y="330" width="98" height="34" rx="9"/>
    </g>
    <g fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">
      <text x="960" y="310">All</text>
      <text x="1065" y="310">AI</text>
      <text x="960" y="352">You</text>
      <text x="1065" y="352">None</text>
    </g>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="890" y="426" width="246" height="112" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="912" y="460" fill="#065f46" font-size="16" font-weight="800">Privacy first</text>
    <text x="912" y="487" fill="#047857" font-size="14">No server processing</text>
    <text x="912" y="512" fill="#047857" font-size="14">No analytics or tracking</text>
  </g>
</svg>
